<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Legislativo - Buscador de Votaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; }
        .tab-btn { transition: all 0.2s; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { color: #0f172a; }
        /* Colores de votos */
        .vote-Afirmativo { color: #166534; background-color: #dcfce7; }
        .vote-Negativo { color: #991b1b; background-color: #fee2e2; }
        .vote-Ausente { color: #854d0e; background-color: #fef08a; }
        .vote-Abstencion { color: #475569; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-5xl mx-auto pt-12 px-4 pb-20">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Monitor Legislativo</h1>
            <p class="text-slate-500 mb-6">Transparencia y análisis de la labor parlamentaria</p>
            
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="searchInput" placeholder="Buscar diputado/a (Ej: Recalde, Hector)..." 
                       class="w-full px-5 py-3 rounded-xl border border-slate-200 shadow-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                <button onclick="buscarDiputado()" class="absolute right-2 top-2 bg-slate-900 text-white px-5 py-1.5 rounded-lg hover:bg-slate-800 transition">
                    Buscar
                </button>
            </div>
            <p id="statusUpdate" class="text-xs text-slate-400 mt-4 italic"></p>
        </header>

        <div id="resultados" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex justify-between items-center">
                <div>
                    <h2 id="dipNombre" class="text-2xl font-bold text-slate-900 uppercase"></h2>
                    <div class="flex gap-3 mt-2 text-sm font-medium">
                        <span id="dipBloque" class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full border border-blue-100"></span>
                        <span id="dipProvincia" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full border border-slate-200"></span>
                    </div>
                </div>
            </div>

            <div class="border-b border-slate-200 mb-6 flex overflow-x-auto gap-6" id="tabs">
                <button onclick="cambiarTab('mandatos')" class="tab-btn tab-active pb-3 whitespace-nowrap" id="btn-mandatos">Mandatos</button>
                <button onclick="cambiarTab('alineamiento')" class="tab-btn tab-inactive pb-3 whitespace-nowrap" id="btn-alineamiento">Alineamiento Político</button>
                <button onclick="cambiarTab('lealtad')" class="tab-btn tab-inactive pb-3 whitespace-nowrap" id="btn-lealtad">Lealtad Partidaria</button>
                <button onclick="cambiarTab('votos_anuales')" class="tab-btn tab-inactive pb-3 whitespace-nowrap" id="btn-votos_anuales">Votos por Año</button>
                <button onclick="cambiarTab('leyes')" class="tab-btn tab-inactive pb-3 whitespace-nowrap" id="btn-leyes">Leyes Destacadas</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[400px]">
                <div id="tab-mandatos" class="tab-content block">
                    <h3 class="text-lg font-semibold mb-4">Períodos Legislativos</h3>
                    <ul id="listaMandatos" class="space-y-3"></ul>
                </div>

                <div id="tab-alineamiento" class="tab-content hidden w-full">
                    <h3 class="text-lg font-semibold mb-4 text-center">Coincidencia con otros bloques</h3>
                    <div class="h-80 w-full"><canvas id="chartAlineamiento"></canvas></div>
                </div>

                <div id="tab-lealtad" class="tab-content hidden w-full">
                    <h3 class="text-lg font-semibold mb-4 text-center">Lealtad al bloque propio (%)</h3>
                    <div class="h-80 w-full"><canvas id="chartLealtad"></canvas></div>
                </div>

                <div id="tab-votos_anuales" class="tab-content hidden w-full">
                    <h3 class="text-lg font-semibold mb-4 text-center">Historial de votos</h3>
                    <div class="h-80 w-full"><canvas id="chartVotos"></canvas></div>
                </div>

                <div id="tab-leyes" class="tab-content hidden">
                    <h3 class="text-lg font-semibold mb-4">Votaciones Relevantes</h3>
                    <div id="listaLeyes" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="noResult" class="hidden text-center py-12 text-slate-500">
            <p class="text-lg">No se encontraron resultados para esa búsqueda.</p>
        </div>
    </div>

    <script>
        // Variables globales
        let baseDeDatos = null;
        let chartAlign = null, chartLoyalty = null, chartVotes = null;
        let legisladorActual = null;

        // --- CARGA DE DATOS DESDE EL ARCHIVO JSON ---
        fetch('datos_legislativos.json')
            .then(response => response.json())
            .then(data => {
                baseDeDatos = data;
                document.getElementById('statusUpdate').innerText = "Datos actualizados al: " + data.ultima_actualizacion;
            })
            .catch(error => {
                console.error("Error al cargar datos:", error);
                document.getElementById('statusUpdate').innerText = "Error cargando la base de datos.";
            });

        function buscarDiputado() {
            if (!baseDeDatos) return;

            const input = document.getElementById('searchInput').value.toUpperCase().trim();
            const resultadosDiv = document.getElementById('resultados');
            const noResultDiv = document.getElementById('noResult');
            
            legisladorActual = baseDeDatos.diputados.find(d => d.nombre_oficial.includes(input));

            if (legisladorActual && input !== "") {
                document.getElementById('dipNombre').innerText = legisladorActual.nombre_oficial;
                document.getElementById('dipBloque').innerText = legisladorActual.bloque;
                document.getElementById('dipProvincia').innerText = legisladorActual.provincia;

                cargarMandatos();
                cargarLeyes();
                
                resultadosDiv.classList.remove('hidden');
                noResultDiv.classList.add('hidden');
                cambiarTab('mandatos');
            } else {
                resultadosDiv.classList.add('hidden');
                noResultDiv.classList.remove('hidden');
            }
        }

        document.getElementById("searchInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") buscarDiputado();
        });

        function cambiarTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('block');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('tab-inactive');
            });
            document.getElementById('btn-' + tabId).classList.remove('tab-inactive');
            document.getElementById('btn-' + tabId).classList.add('tab-active');

            if (tabId === 'alineamiento') renderChartAlineamiento();
            if (tabId === 'lealtad') renderChartLealtad();
            if (tabId === 'votos_anuales') renderChartVotos();
        }

        function cargarMandatos() {
            const lista = document.getElementById('listaMandatos');
            lista.innerHTML = '';
            legisladorActual.mandatos.forEach(m => {
                lista.innerHTML += `<li class="p-3 bg-slate-50 rounded-lg border border-slate-100 font-medium">Período: ${m}</li>`;
            });
        }

        function cargarLeyes() {
            const lista = document.getElementById('listaLeyes');
            lista.innerHTML = '';
            legisladorActual.leyes_destacadas.forEach(l => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center p-4 border border-slate-200 rounded-xl">
                        <div><h4 class="font-bold">${l.proyecto}</h4><p class="text-sm">${l.fecha}</p></div>
                        <span class="px-3 py-1 text-sm font-semibold rounded-full vote-${l.sentido}">${l.sentido}</span>
                    </div>`;
            });
        }

        function renderChartAlineamiento() {
            if (chartAlign) chartAlign.destroy();
            const ctx = document.getElementById('chartAlineamiento').getContext('2d');
            chartAlign = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(legisladorActual.alineamiento_bloques),
                    datasets: [{ label: '% Coincidencia', data: Object.values(legisladorActual.alineamiento_bloques), backgroundColor: '#3b82f6', borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' }
            });
        }

        function renderChartLealtad() {
            if (chartLoyalty) chartLoyalty.destroy();
            const ctx = document.getElementById('chartLealtad').getContext('2d');
            chartLoyalty = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(legisladorActual.lealtad_anual),
                    datasets: [{ label: 'Lealtad (%)', data: Object.values(legisladorActual.lealtad_anual), borderColor: '#0f172a', backgroundColor: 'rgba(15, 23, 42, 0.1)', fill: true, tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
            });
        }

        function renderChartVotos() {
            if (chartVotes) chartVotes.destroy();
            const ctx = document.getElementById('chartVotos').getContext('2d');
            const years = Object.keys(legisladorActual.votos_anuales);
            chartVotes = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'Afirmativo', data: years.map(y => legisladorActual.votos_anuales[y].afirmativo), backgroundColor: '#166534' },
                        { label: 'Negativo', data: years.map(y => legisladorActual.votos_anuales[y].negativo), backgroundColor: '#991b1b' },
                        { label: 'Ausente', data: years.map(y => legisladorActual.votos_anuales[y].ausente), backgroundColor: '#854d0e' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } }
            });
        }
    </script>
</body>
</html>
