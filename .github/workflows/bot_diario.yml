name: Actualizar Datos Legislativos Diariamente

on:
  schedule:
    # 11:00 UTC equivale a las 08:00 AM en Argentina
    - cron: '0 11 * * *'
  workflow_dispatch: # Este comando nos permite apretar un botón para probarlo ahora mismo

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- ESTE ES EL PASO NUEVO QUE FALTABA ---
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml bs4 html5lib cloudscraper 

      - name: Ejecutar el Scraper
        run: python scraper.py

      - name: Guardar los datos nuevos (Commit y Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datos_legislativos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de base de datos"
          git push
