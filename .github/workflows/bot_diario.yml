name: Actualizar Datos Legislativos Diariamente

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y Navegador Real (Playwright)
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml bs4 html5lib playwright
          playwright install chromium

      - name: Ejecutar el Scraper
        run: python scraper.py

      - name: Guardar los datos nuevos (Commit y Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datos_legislativos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de base de datos"
          git push
